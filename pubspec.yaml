name: mcache_dart
description: >-
  High-performance in-memory cache for Dart. LRU eviction,
  absolute/sliding/change-token expiration, priority eviction,
  byte-size limits, anti-stampede GetOrCreate, post-eviction callbacks.
version: 0.1.9
repository: https://github.com/PurpleSoftSrl/mcache_dart
topics:
  - cache
  - caching
  - memory
  - lru
  - flutter

environment:
  sdk: ^3.4.0

dependencies:
  meta: ^1.15.0

dev_dependencies:
  lints: ^4.0.0
  test: ^1.25.0
